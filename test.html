<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>

<h2>CORS Test</h2>

<button onclick="callApi()">Call API</button>

<script>
async function callApi() {

    try {

        const response = await fetch(
            "https://localhost:7190/api/v1/Products");

        const data = await response.json();

        console.log(data);

        alert("CORS Working ✅");
    }
    catch(error)
    {
        console.log(error);

        alert("CORS Error ❌");
    }

}
</script>

</body>
</html>
